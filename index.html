<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donanım Monitörü Kontrol Merkezi</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #30363d;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        p {
            margin-bottom: 35px;
            font-size: 15px;
            color: #8b949e;
        }
        .download-btn {
            background-color: #238636;
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
            border: 1px solid rgba(240, 246, 252, 0.1);
        }
        .download-btn:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(46, 160, 67, 0.4);
        }
        .version-info {
            margin-top: 25px;
            font-size: 13px;
            color: #484f58;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYS MONITOR</h1>
        <p>Arka plan sistem okuyucu servisi (OLED İletişim Protokolü)</p>
        
        <a href="monitor.exe" download="monitor.exe" class="download-btn">
            Yazılımı İndir (v3.0)
        </a>
        
        <div class="version-info">
            Sürüm: 3.0 | Arka Plan Servisi | Boyut: ~5MB
        </div>
    </div>
</body>
</html>
