<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donanım Monitörü Kontrol Merkezi</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #30363d;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        p {
            margin-bottom: 30px;
            font-size: 15px;
            color: #8b949e;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: block;
            border: 1px solid rgba(240, 246, 252, 0.1);
        }
        .driver-btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .driver-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            transform: translateY(-2px);
        }
        .download-btn {
            background-color: #238636;
        }
        .download-btn:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(46, 160, 67, 0.4);
        }
        .version-info {
            margin-top: 25px;
            font-size: 13px;
            color: #484f58;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYS MONITOR</h1>
        <p>OLED Donanım Paneli Kurulum Merkezi</p>
        
        <div class="btn-group">
            <a href="arduino_driver.rar" download="arduino_driver.rar" class="btn driver-btn">
                🛠️ 1. Adım: Windows Sürücüsünü İndir
            </a>

            <a href="monitor.exe" download="monitor.exe" class="btn download-btn">
                🚀 2. Adım: İzleme Yazılımını Başlat
            </a>
        </div>
        
        <div class="version-info">
            Sürüm: 3.5 | Sürücü + Arka Plan Servisi Desteği
        </div>
    </div>
</body>
</html>
